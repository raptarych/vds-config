services:
  wg-easy:
    image: weejewel/wg-easy
    container_name: wg-easy
    restart: unless-stopped
    ports:
      - "51820:51820/udp"
      - "51821:51821/tcp"
    environment:
      - WG_HOST=${EXTERNAL_IP}
      - PASSWORD=${WG_PANEL_PASSWORD}
    volumes:
      - ~/.wg-easy:/etc/wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.rp_filter=0

  mtproto-proxy:
    image: telegrammessenger/proxy
    container_name: mtproto-proxy
    restart: unless-stopped
    ports:
      - "${PORT:-484}:443"
    volumes:
      - ~/.proxy-config:/data
    environment:
      - SECRET=${TG_PROXY_SECRET}
